# SimpleTask — Nginx 反向代理（HTTP）
# 由 install.sh --with-nginx 安装到 /etc/nginx/sites-available/tasktracker
# 占位符 @PORT@ 会被替换为应用监听端口（默认 8088）
#
# HTTPS：见同目录 tasktracker.nginx-https.example.conf；应用侧设置 AUTH_SECURE_COOKIE=true。

server {
	listen 80;
	listen [::]:80;
	server_name _;

	# 上传头像/Logo 等若增大，可取消注释并调大
	# client_max_body_size 20m;

	location / {
		proxy_pass http://127.0.0.1:@PORT@;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_redirect off;
	}
}
