# SimpleTask — Nginx HTTPS 示例（Let's Encrypt / 自有证书）
# 用法：将 example.com 换成你的域名；证书路径按 certbot 实际输出修改。
# 应用应监听 127.0.0.1:8088，systemd 中设置：
#   Environment=LISTEN_ADDR=127.0.0.1:8088
#   Environment=AUTH_SECURE_COOKIE=true
# BASE_URL 建议设为 https://example.com

# HTTP 重定向到 HTTPS（可选；certbot 有时也会改此块）
server {
	listen 80;
	listen [::]:80;
	server_name example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name example.com;

	ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
	# include /etc/letsencrypt/options-ssl-nginx.conf;
	# ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	# client_max_body_size 20m;

	location / {
		proxy_pass http://127.0.0.1:@PORT@;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_redirect off;
	}
}